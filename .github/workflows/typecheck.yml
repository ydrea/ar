name: TypeScript cleanup

on:
  pull_request:
    branches:
      - testsDEBUG
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check active app graph
        id: typecheck
        shell: bash
        run: |
          set +e
          npx tsc --noEmit > typecheck.log 2>&1
          status=$?
          cat typecheck.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log

      - name: Run Jest
        run: npm test -- --runInBand

      - name: Fail on TypeScript errors
        if: steps.typecheck.outputs.status != '0'
        run: exit 1
