name: TypeScript cleanup

on:
  pull_request:
    branches:
      - testsDEBUG
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check active app graph
        run: npx tsc --noEmit

      - name: Run Jest
        run: npm test -- --runInBand
