name: TypeScript cleanup

on:
  pull_request:
    branches:
      - testsDEBUG
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check active app graph
        id: typecheck
        shell: bash
        run: |
          set +e
          npx tsc --noEmit > typecheck.log 2>&1
          status=$?
          cat typecheck.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log

      - name: Audit production logging calls
        shell: bash
        run: |
          : > production-log-audit.txt
          roots=(app components contexts cumquat data hooks modules ui utils)
          existing=()
          for root in "${roots[@]}"; do
            [[ -e "$root" ]] && existing+=("$root")
          done

          if ((${#existing[@]})); then
            git grep -nE \
              'console\.(log|warn|error)|\b(Tlog|Slog|Rlog|Plog|Elog|Dlog|PlogPerf)[[:space:]]*\(|std::(cout|cerr)|(^|[^[:alnum:]_])(printf|fprintf)[[:space:]]*\(|__android_log|\bLOG[DIWEF][[:space:]]*\(' \
              -- "${existing[@]}" \
              ':!**/__tests__/**' \
              ':!**/*.test.*' \
              ':!**/build/**' \
              > production-log-audit.txt || true
          fi

          cat production-log-audit.txt

      - name: Upload production log audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-log-audit
          path: production-log-audit.txt

      - name: Run Jest
        run: npm test -- --runInBand

      - name: Fail on TypeScript errors
        if: steps.typecheck.outputs.status != '0'
        run: exit 1
